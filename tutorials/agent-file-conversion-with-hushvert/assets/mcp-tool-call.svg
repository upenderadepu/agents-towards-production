<svg xmlns="http://www.w3.org/2000/svg" width="940" height="330" viewBox="0 0 940 330" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="940" height="330" fill="#ffffff"/>
  <text x="470" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">One tool call, end to end</text>

  <!-- Host -->
  <rect x="40" y="70" width="240" height="96" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="160" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">MCP host</text>
  <text x="160" y="118" text-anchor="middle" font-size="11.5" fill="#475569">Claude Code, Cursor, Cline, Zed</text>
  <text x="160" y="140" text-anchor="middle" font-size="11.5" font-style="italic" fill="#475569">"convert quarterly.pptx to markdown"</text>

  <!-- MCP server -->
  <rect x="350" y="70" width="240" height="96" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="470" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#0c4a6e">@hushvert/mcp</text>
  <text x="470" y="118" text-anchor="middle" font-size="11.5" fill="#075985">npx, key from env, never logged</text>
  <text x="470" y="136" text-anchor="middle" font-size="11.5" fill="#075985">reads the file, runs the flow,</text>
  <text x="470" y="152" text-anchor="middle" font-size="11.5" fill="#075985">writes output beside the input</text>

  <!-- API -->
  <rect x="660" y="70" width="240" height="96" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="780" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Hosted API</text>
  <text x="780" y="118" text-anchor="middle" font-size="11.5" fill="#475569">submit, upload, poll, download</text>
  <text x="780" y="136" text-anchor="middle" font-size="11.5" fill="#475569">input deleted at completion</text>

  <!-- Arrows -->
  <line x1="280" y1="104" x2="346" y2="104" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="313" y="94" text-anchor="middle" font-size="11" fill="#334155">convert_file</text>
  <line x1="590" y1="104" x2="656" y2="104" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="623" y="94" text-anchor="middle" font-size="11" fill="#334155">REST</text>
  <line x1="656" y1="134" x2="590" y2="134" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr3)"/>
  <line x1="346" y1="134" x2="280" y2="134" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr3)"/>
  <text x="313" y="152" text-anchor="middle" font-size="11" fill="#334155">quarterly.md</text>

  <!-- Refusal branch -->
  <line x1="470" y1="166" x2="470" y2="212" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr3)"/>
  <rect x="300" y="216" width="340" height="72" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="470" y="242" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#064e3b">client-convertible pair requested (heic to jpg)?</text>
  <text x="470" y="262" text-anchor="middle" font-size="11.5" fill="#065f46">refused with a pointer to @hushvert/engine,</text>
  <text x="470" y="278" text-anchor="middle" font-size="11.5" fill="#065f46">so agent loops never pay for local work</text>

  <!-- Guards -->
  <rect x="672" y="216" width="228" height="72" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="786" y="240" text-anchor="middle" font-size="12" font-weight="bold" fill="#713f12">Production guards</text>
  <text x="786" y="259" text-anchor="middle" font-size="11" fill="#854d0e">HUSHVERT_ALLOWED_DIR sandbox</text>
  <text x="786" y="275" text-anchor="middle" font-size="11" fill="#854d0e">HUSHVERT_MAX_JOBS_PER_SESSION</text>
</svg>
